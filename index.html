<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SushiDAW - Web</title>
    <style>
        body {
            background-color: #FDF6EE;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            color: #3D2B1F;
        }

        h1 { margin-bottom: 5px; }
        .subtitle { color: #9E8070; font-size: 14px; margin-bottom: 30px; }

        /* The Grid */
        .grid-container {
            display: grid;
            grid-template-columns: 100px repeat(8, 45px);
            gap: 6px;
            align-items: center;
        }

        .label { font-size: 12px; font-weight: 600; color: #5C4033; }

        .cell {
            width: 45px;
            height: 45px;
            background-color: #EDE3D8;
            border: 1px solid #D4C4B5;
            border-radius: 6px;
            cursor: pointer;
            transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .cell:active { transform: scale(1.1); }
        .cell.active { border-color: rgba(0,0,0,0.1); }

        /* The Roll Preview */
        .roll-container {
            margin-top: 40px;
            width: 100%;
            max-width: 500px;
        }

        .roll-label { font-size: 13px; color: #9E8070; margin-bottom: 10px; font-weight: 500; }

        .seaweed {
            width: 100%;
            height: 80px;
            background-color: #2A3628;
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .ingredient-pop {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        /* Buttons */
        .button-row {
            margin-top: 30px;
            display: flex;
            gap: 15px;
        }

        button {
            padding: 12px 24px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-clear { background: none; border: 1px solid #9E8070; color: #9E8070; }
        .btn-rand { background-color: #E8667A; color: white; }
    </style>
</head>
<body>

<h1>sushiDAW!</h1>
<div class="subtitle">tap cells to add ingredients to your roll</div>

<div class="grid-container" id="sequencer">
</div>

<div class="roll-container">
    <div class="roll-label">your roll</div>
    <div class="seaweed" id="preview">
        <span style="color: #6A7D68">tap some ingredients above ✨</span>
    </div>
</div>

<div class="button-row">
    <button class="btn-clear" onclick="clearGrid()">🗑 clear roll</button>
    <button class="btn-rand" onclick="randomise()">🎲 randomise</button>
</div>

<script>
    const INGREDIENTS = [
        { name: "Rice", emoji: "🍚", color: "#F5E6C8" },
        { name: "Salmon", emoji: "🐟", color: "#FFAA7F" },
        { name: "Tuna", emoji: "🔴", color: "#E8667A" },
        { name: "Avocado", emoji: "🥑", color: "#8BC34A" },
        { name: "Cucumber", emoji: "🥒", color: "#6DBF8A" },
        { name: "Egg", emoji: "🥚", color: "#FFF176" },
        { name: "Cheese", emoji: "🧀", color: "#FFF9C4" },
        { name: "Prawn", emoji: "🦐", color: "#FFCCBC" }
    ];

    let gridState = INGREDIENTS.map(() => Array(8).fill(false));

    function initGrid() {
        const container = document.getElementById('sequencer');
        container.innerHTML = '';

        // Add column numbers
        container.appendChild(document.createElement('div')); // Empty corner
        for(let i=1; i<=8; i++) {
            const num = document.createElement('div');
            num.innerText = i;
            num.style.textAlign = 'center';
            num.style.fontSize = '11px';
            num.style.color = '#BBAA99';
            container.appendChild(num);
        }

        // Add rows
        INGREDIENTS.forEach((ing, r) => {
            const label = document.createElement('div');
            label.className = 'label';
            label.innerText = `${ing.emoji} ${ing.name}`;
            container.appendChild(label);

            for(let c=0; c<8; c++) {
                const cell = document.createElement('div');
                cell.className = `cell ${gridState[r][c] ? 'active' : ''}`;
                if(gridState[r][c]) cell.style.backgroundColor = ing.color;
                cell.onclick = () => toggleCell(r, c);
                container.appendChild(cell);
            }
        });
        updatePreview();
    }

    function toggleCell(r, c) {
        gridState[r][c] = !gridState[r][c];
        initGrid();
    }

    function updatePreview() {
        const preview = document.getElementById('preview');
        const activeIngs = INGREDIENTS.filter((_, i) => gridState[i].some(cell => cell));

        if(activeIngs.length === 0) {
            preview.innerHTML = '<span style="color: #6A7D68">tap some ingredients above ✨</span>';
            return;
        }

        preview.innerHTML = '';
        activeIngs.forEach(ing => {
            const el = document.createElement('div');
            el.className = 'ingredient-pop';
            el.style.backgroundColor = ing.color;
            el.innerText = ing.emoji;
            preview.appendChild(el);
        });
    }

    function clearGrid() {
        gridState = INGREDIENTS.map(() => Array(8).fill(false));
        initGrid();
    }

    function randomise() {
        gridState = INGREDIENTS.map(() => Array(8).fill(0).map(() => Math.random() > 0.85));
        initGrid();
    }

    initGrid();
</script>
</body>
</html>
