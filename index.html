<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <script src="env.js"></script>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
    <title>SushiDAW</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,400&family=Caveat:wght@500;700&family=Instrument+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="css/base.css"/>
    <link rel="stylesheet" href="css/ingredients.css"/>
    <link rel="stylesheet" href="css/animations.css"/>
</head>
<body>

<!-- ══ TOPBAR ══ -->
<header class="topbar">
    <div class="logo">
        <div class="logo-mark wobble-hover">🍣</div>
        <span class="logo-word">Sushi<em>DAW</em></span>
    </div>
    <div class="topbar-divider"></div>
    <span class="topbar-sub">channel rack</span>
    <div class="topbar-right">
        <button class="icon-pill wobble-hover" onclick="UI.toggleTheme()" title="Toggle theme"><span id="theme-icon">☽</span></button>
        <button class="icon-pill wobble-hover" onclick="UI.toggleSettings()" title="Settings">⚙</button>
        <button class="pill danger" onclick="App.clearAll()">clear</button>
        <button class="pill accent wobble-hover" onclick="App.randomise()">🎲 random beat</button>
    </div>
</header>

<!-- ══ SETTINGS DRAWER ══ -->
<div id="piano-roll-overlay" class="hidden">
    <div class="piano-roll-header">
        <span>Ingredient Editor</span>
        <button class="done-btn" onclick="closePianoRoll()">Done</button>
    </div>
    <div class="piano-roll-grid-container">
        <div class="piano-keys-sidebar"></div>
        <div id="piano-roll-grid"></div>
    </div>
</div>

<!-- ── Settings drawer (Gemini key lives here, no label) ── -->
<div class="settings-drawer" id="settings-drawer" aria-hidden="true">
    <div class="settings-inner">
        <label class="settings-label">Gemini key</label>
        <input class="settings-input" id="gemini-key" type="password" placeholder="AIza…" autocomplete="off" spellcheck="false"/>
        <span class="settings-hint">✦ whispers beat ideas in the background</span>
    </div>
</div>

<!-- ══ TRANSPORT ══ -->
<div class="transport">
    <div class="tgroup">
        <button class="t-btn play-btn" id="btn-play" onclick="App.togglePlay()">▶</button>
        <button class="t-btn" onclick="App.stop()">■</button>
    </div>
    <div class="tdivider"></div>
    <div class="tgroup">
        <span class="tparam">bpm</span>
        <div class="tnum" id="bpm-display">128</div>
        <div class="tnudge-col">
            <button class="tnudge" id="bpm-up" onclick="App.nudgeBpm(1)">▲</button>
            <button class="tnudge" id="bpm-dn" onclick="App.nudgeBpm(-1)">▼</button>
        </div>
    </div>
    <div class="tdivider"></div>
    <div class="tgroup">
        <span class="tparam">steps</span>
        <div class="tnum" id="steps-display">16</div>
        <div class="tnudge-col">
            <button class="tnudge" onclick="App.nudgeSteps(8)">▲</button>
            <button class="tnudge" onclick="App.nudgeSteps(-8)">▼</button>
        </div>
    </div>
    <div class="tdivider"></div>
    <div class="tgroup">
        <span class="tparam">pat</span>
        <div class="pat-btns" id="pat-btns"></div>
    </div>
    <div class="t-spacer"></div>
    <div class="step-readout">
        <span class="readout-label">step</span>
        <span class="readout-val" id="r-step">—</span>
        <span class="readout-sep">/</span>
        <span class="readout-label">bar</span>
        <span class="readout-val" id="r-bar">—</span>
    </div>
    <!-- BIG FINISH BUTTON -->
    <button class="finish-btn" id="finish-btn" onclick="Roll.trigger()">
        <span class="finish-stamp">🍱</span> finish roll
    </button>
</div>

<!-- ══ RACK AREA ══ -->
<div class="rack-area" id="rack-area">
    <div class="rack-scroll" id="rack-scroll">
        <div class="step-header" id="step-header"></div>
        <div class="rack" id="rack"></div>
        <!-- Rice + Nori base sits directly under ingredients -->
        <div class="rack-sushi-base" aria-hidden="true">
            <div class="rsb-inner">
                <div class="rsb-label">~ rice + nori ~</div>
                <div class="rsb-bars">
                    <div class="rsb-bar rsb-rice"></div>
                    <div class="rsb-bar rsb-nori"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- ══ STATUS STRIP ══ -->
<div class="status-strip">
    <div class="status-item">active <span id="stat-active">0</span></div>
    <div class="status-item">pattern <span id="stat-pat">1</span></div>
    <div class="status-item gemini-pulse" id="gemini-indicator" style="display:none">
        <span class="gem-dot">✦</span> suggestions — click ghost cells to accept
    </div>
</div>

<!-- ══ INGREDIENT SHELF ══ -->
<div class="ingredient-shelf">
    <div class="shelf-heading">
        <span class="shelf-title">ingredients</span>
        <span class="shelf-sub">tap to add a layer ↓</span>
    </div>
    <div class="shelf-pills" id="shelf-pills"></div>
    <div class="ai-ingredient-container">
        <div class="ai-input-wrapper">
            <input type="text" id="ai-ing-input" class="settings-input ai-field" placeholder="create a new ingredient!" autocomplete="off">
            <button class="pill accent ai-create-btn wobble-hover" onclick="GeminiSuggest.generateIngredient(document.getElementById('ai-ing-input').value)">
                <span>✨</span> create!
            </button>
        </div>
    </div>

</div>

<!-- ══ SUSHI ROLL MODAL ══ -->
<div class="roll-overlay" id="roll-overlay">
    <div class="roll-modal" id="roll-modal">
        <div class="roll-modal-header">
            <span class="roll-modal-title" id="roll-modal-title">rolling your sushi…</span>
        </div>
        <div class="roll-stage" id="roll-stage">
            <canvas id="roll-canvas" width="400" height="400"></canvas>
        </div>
        <div class="roll-modal-footer" id="roll-footer" style="display:none">
            <div class="roll-name" id="roll-name"></div>
            <div class="roll-ingredients" id="roll-ingredients"></div>
            <button class="pill accent roll-close-btn" onclick="Roll.close()">🎉 eat it!</button>
            <button class="pill" onclick="Roll.close()">back to editing</button>
        </div>
    </div>
</div>

<div id="mascot-container" class="mascot-idle">
    <div id="mascot-sprite"></div>
    <div class="mascot-bubble" id="mascot-bubble">Ready to roll?</div>
</div>

<script src="js/audio.js"></script>
<script src="js/gemini.js"></script>
<script src="js/roll.js"></script>
<script src="js/app.js"></script>



</body>
</html>
